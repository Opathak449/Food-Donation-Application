services:
  - type: web
    name: foodshare-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: JWT_SECRET
        value: your_secure_32_character_random_string_here
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true